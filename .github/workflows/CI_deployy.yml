name: CI — Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:       # allow manual trigger from Actions tab

# Grant permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; queued runs wait, not cancel
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Validate ─────────────────────────────────────
  validate:
    name: Validate HTML & JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking project files..."
          test -f index.html && echo "✅ index.html" || (echo "❌ index.html missing" && exit 1)
          test -f style.css  && echo "✅ style.css"  || (echo "❌ style.css missing"  && exit 1)
          test -f app.js     && echo "✅ app.js"     || (echo "❌ app.js missing"     && exit 1)
          echo "All files present."

      - name: Check for syntax errors in JS
        run: |
          node --check app.js && echo "✅ app.js syntax OK" || (echo "❌ JS syntax error" && exit 1)

  # ── Job 2: Deploy ────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate          # only deploy if validate passes
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # deploy entire repo root (no build step needed)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: echo "🚀 Live at ${{ steps.deployment.outputs.page_url }}"
